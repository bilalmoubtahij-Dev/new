<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Highway Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              orange: {
                50: '#fff7ed',
                100: '#ffedd5',
                200: '#fed7aa',
                300: '#fdba74',
                400: '#fb923c',
                500: '#f97316',
                600: '#ea580c', // Primary brand color
                700: '#c2410c',
                800: '#9a3412',
                900: '#7c2d12',
              },
              dark: {
                900: '#0f0f0f',
                800: '#1a1a1a',
                700: '#262626',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0f0f0f;
        color: #f3f4f6;
      }
      /* Custom scrollbar for dark theme */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1a1a1a;
      }
      ::-webkit-scrollbar-thumb {
        background: #ea580c;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #f97316;
      }
      
      /* Initial App Loader Styles */
      .loader-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #0f0f0f;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      .loader-spinner {
        position: relative;
        width: 60px;
        height: 60px;
        border: 4px solid rgba(234, 88, 12, 0.1);
        border-top: 4px solid #ea580c;
        border-radius: 50%;
        animation: spin 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite;
      }
      .loader-logo {
        margin-top: 24px;
        font-size: 20px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .loader-text {
        margin-top: 8px;
        font-size: 13px;
        color: #737373;
        font-weight: 400;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
</head>
  <body>
    <div id="root">
      <div class="loader-container">
        <div class="loader-spinner"></div>
        <div class="loader-logo">Highway Academy</div>
        <div class="loader-text">Loading placement platform...</div>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
